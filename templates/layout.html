<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyCommitForge</title>
    <!-- Load Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Load Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa; /* Bootstrap light gray */
        }
        .navbar-brand {
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        /* Making the left border of the cards thicker for the streak indicator */
        .streak-card {
            border-left-width: 8px !important; 
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-hammer me-2"></i>DailyCommitForge
            </a>
            <span class="navbar-text text-white-50">
                Forge your daily commitment.
            </span>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container py-5 flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white text-center py-4 mt-auto border-top">
        <div class="container text-muted small">
            &copy; 2025 RP's DailyCommitForge Project
        </div>
    </footer>

    <!-- Load Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

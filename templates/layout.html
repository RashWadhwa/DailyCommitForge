<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyCommitForge</title>
    <!-- Load Tailwind CSS from the official CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Simple style for buttons to make them consistent */
        .btn {
            @apply inline-block px-4 py-2 rounded-lg text-white font-semibold shadow-md transition-all duration-200;
        }
        .btn-blue {
            @apply bg-blue-600 hover:bg-blue-700;
        }
        .btn-green {
            @apply bg-green-600 hover:bg-green-700;
        }
        .btn-red {
            @apply bg-red-600 hover:bg-red-700;
        }
        .btn-gray {
             @apply bg-gray-500 cursor-not-allowed;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
    
    <nav class="bg-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <h1 class="text-3xl font-bold text-gray-800">DailyCommitForge</h1>
            <p class="text-gray-600">Forge your daily commitment.</p>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        <!-- Content from child templates will be injected here -->
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-gray-500 text-sm mt-12 pb-8">
        DailyCommitForge Project
    </footer>

</body>
</html>
